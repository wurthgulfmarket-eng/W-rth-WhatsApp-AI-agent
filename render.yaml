services:
  - type: web
    name: wurth-whatsapp-agent
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v20.0
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: nvidia/nemotron-3-ultra-550b-a55b:free
      - key: OPENROUTER_FALLBACK_MODELS
        value: "google/gemma-4-26b-a4b-it:free,meta-llama/llama-3.3-70b-instruct:free"
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_FILE
        value: ./credentials/service_account.json
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_SHEET_WORKSHEET_NAME
        value: Sheet1
      - key: FUZZY_MATCH_THRESHOLD
        value: "75"
      - key: ESCALATION_NOTIFY_NUMBERS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DASHBOARD_ADMIN_USERNAME
        sync: false
      - key: DASHBOARD_ADMIN_PASSWORD
        sync: false
      - key: DASHBOARD_SESSION_SECRET
        sync: false
      - key: WHATSAPP_ESCALATION_TEMPLATE_NAME
        sync: false
      - key: WHATSAPP_ESCALATION_TEMPLATE_LANGUAGE
        value: en
      - key: WHATSAPP_ESCALATION_OPS_TEMPLATE_NAME
        sync: false
      - key: LEAD_DEDUP_WINDOW_HOURS
        value: "36"
      - key: LEAD_FOLLOWUP_HOURS
        value: "24"
      - key: WHATSAPP_REP_REMINDER_TEMPLATE_NAME
        sync: false
      - key: WHATSAPP_REP_REMINDER_TEMPLATE_LANGUAGE
        value: en
      - key: PYTHON_VERSION
        value: 3.11.9
